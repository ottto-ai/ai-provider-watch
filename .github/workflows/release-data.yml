name: Data Release Dry Run

on:
  schedule:
    - cron: "43 7 * * *"
  workflow_dispatch:
    inputs:
      release_date:
        description: "UTC release date as YYYY-MM-DD. Empty uses today."
        required: false
        type: string
        default: ""
      release_id:
        description: "Optional data release ID, such as data-YYYY.MM.DD or data-YYYY.MM.DD.N."
        required: false
        type: string
        default: ""

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: data-release-dry-run-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv sync --all-extras
      - run: uv lock --check
      - run: uv run ruff check .
      - run: uv run pytest
      - run: uv run apw source test
      - run: uv run apw source coverage --summary
      - run: uv run apw validate
      - run: uv run apw index --check
      - run: uv build --out-dir .apw/dist
      - name: Install package and run release dry-run
        env:
          INPUT_RELEASE_DATE: ${{ inputs.release_date }}
          INPUT_RELEASE_ID: ${{ inputs.release_id }}
        run: |
          uv venv .apw/install-smoke --python 3.12 --seed
          . .apw/install-smoke/bin/activate
          python -m pip install .apw/dist/*.whl
          smoke_dir="$(mktemp -d)"
          (
            cd "$smoke_dir"
            apw validate
            apw index --check
            apw source coverage --summary
            apw latest --limit 1 >/tmp/apw-installed-latest.json
          )
          apw --root "$PWD" validate
          release_date="$INPUT_RELEASE_DATE"
          if [ -z "$release_date" ]; then
            release_date="$(date -u +%F)"
          fi
          case "$release_date" in
            [0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]) ;;
            *) echo "release_date must be YYYY-MM-DD" >&2; exit 1 ;;
          esac
          release_id="$INPUT_RELEASE_ID"
          if [ -z "$release_id" ]; then
            release_id="data-${release_date//-/.}"
          fi
          apw --root "$PWD" release dry-run \
            --release-date "$release_date" \
            --release-id "$release_id" \
            --output .apw/release-dry-run \
            --require-clean
          apw --root "$PWD" release verify \
            --dry-run-report ".apw/release-dry-run/${release_id}/dry-run-report.json" \
            --release-id "$release_id" \
            --source-commit "$(git rev-parse HEAD)"
      - name: Package dry-run evidence bundle
        run: |
          tar \
            --sort=name \
            --mtime="UTC 1970-01-01" \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            -czf .apw/apw-release-dry-run.tgz \
            -C .apw/release-dry-run .
      - name: Generate dry-run artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: .apw/apw-release-dry-run.tgz
      - uses: actions/upload-artifact@v7
        with:
          name: apw-release-dry-run
          path: |
            .apw/release-dry-run
            .apw/apw-release-dry-run.tgz
          if-no-files-found: error

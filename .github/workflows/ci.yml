name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv sync --all-extras
      - run: uv lock --check
      - run: uv run ruff check .
      - run: uv run pytest
      - run: uv run apw source test
      - run: uv run apw validate
      - run: uv run apw index --check
      - run: uv run apw release dry-run --output .apw/ci-release-dry-run

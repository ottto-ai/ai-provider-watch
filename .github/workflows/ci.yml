name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-matrix:
    name: test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --all-extras
      - run: uv lock --check
      - run: uv run ruff check .
      - run: uv run pytest
      - run: uv run apw source test
      - run: uv run apw validate
      - run: uv run apw index --check
      - if: matrix.python-version == '3.12'
        run: uv run apw release dry-run --output .apw/ci-release-dry-run

  test:
    runs-on: ubuntu-latest
    needs: test-matrix
    steps:
      - run: echo "Python version matrix passed."

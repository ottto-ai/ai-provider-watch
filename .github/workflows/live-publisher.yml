name: Live Publisher Dry Run

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: live-publisher-${{ github.ref }}
  cancel-in-progress: true

env:
  APW_LIVE_BASE_URL: https://ai-provider-watch.ottto.net/v1

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv sync --all-extras
      - run: uv run apw source test
      - name: Fetch official sources without mutating repository state
        run: |
          uv run apw source fetch \
            --observations .apw/live-source-observations.json \
            --limit-bytes 1500000
      - name: Generate provisional live candidates
        run: |
          created_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "$created_at" > .apw/live-created-at.txt
          uv run apw candidate generate \
            --observations .apw/live-source-observations.json \
            --output .apw/live-candidates \
            --created-at "$created_at" \
            --clean \
            --skip-reviewed-duplicates \
            > .apw/live-candidate-generation.json
      - name: Build live artifacts
        run: |
          created_at="$(cat .apw/live-created-at.txt)"
          uv run apw live build \
            --candidates .apw/live-candidates \
            --observations .apw/live-source-observations.json \
            --created-at "$created_at" \
            --output .apw/live \
            --feed-url "${APW_LIVE_BASE_URL}/feed.json" \
            --limit 50
      - name: Gate live artifacts
        run: uv run apw live gate --input .apw/live --summary
      - name: Report live publish configuration
        id: r2_config
        env:
          APW_R2_ACCOUNT_ID: ${{ secrets.APW_R2_ACCOUNT_ID }}
          APW_R2_ACCESS_KEY_ID: ${{ secrets.APW_R2_ACCESS_KEY_ID }}
          APW_R2_SECRET_ACCESS_KEY: ${{ secrets.APW_R2_SECRET_ACCESS_KEY }}
          APW_R2_BUCKET: ${{ vars.APW_R2_BUCKET }}
        run: |
          if [ -n "$APW_R2_ACCOUNT_ID" ] && \
             [ -n "$APW_R2_ACCESS_KEY_ID" ] && \
             [ -n "$APW_R2_SECRET_ACCESS_KEY" ] && \
             [ -n "$APW_R2_BUCKET" ]; then
            echo "R2 publish configured for ${APW_LIVE_BASE_URL}"
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "R2 publish skipped: configure APW_R2_ACCOUNT_ID, APW_R2_ACCESS_KEY_ID, APW_R2_SECRET_ACCESS_KEY, and APW_R2_BUCKET."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish live artifacts to Cloudflare R2
        if: steps.r2_config.outputs.configured == 'true'
        env:
          APW_R2_ACCOUNT_ID: ${{ secrets.APW_R2_ACCOUNT_ID }}
          APW_R2_BUCKET: ${{ vars.APW_R2_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.APW_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.APW_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          endpoint_url="https://${APW_R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          uvx --from awscli aws s3 sync \
            .apw/live "s3://${APW_R2_BUCKET}/v1/" \
            --endpoint-url "$endpoint_url" \
            --delete \
            --cache-control "public, max-age=60"
          for key in "v1" "v1/"; do
            uvx --from awscli aws s3api put-object \
              --bucket "$APW_R2_BUCKET" \
              --key "$key" \
              --body .apw/live/index.html \
              --content-type "text/html; charset=utf-8" \
              --cache-control "public, max-age=60" \
              --endpoint-url "$endpoint_url" \
              >/dev/null
          done
          for artifact in \
            index.html \
            latest.json \
            events.json \
            events.ndjson \
            feed.json \
            rss.xml \
            atom.xml \
            source-catalog.json \
            health.json \
            provenance.json; do
            case "$artifact" in
              feed.json) content_type="application/feed+json" ;;
              *.json) content_type="application/json" ;;
              *.ndjson) content_type="application/x-ndjson" ;;
              *.xml) content_type="application/xml" ;;
              *.html) content_type="text/html; charset=utf-8" ;;
              *) content_type="application/octet-stream" ;;
            esac
            uvx --from awscli aws s3api put-object \
              --bucket "$APW_R2_BUCKET" \
              --key "$artifact" \
              --body ".apw/live/$artifact" \
              --content-type "$content_type" \
              --cache-control "public, max-age=60" \
              --endpoint-url "$endpoint_url" \
              >/dev/null
          done
      - name: Smoke public live health endpoint
        if: steps.r2_config.outputs.configured == 'true'
        run: uv run apw live health --url "${APW_LIVE_BASE_URL}/health.json" --summary
      - name: Smoke public live landing endpoints
        if: steps.r2_config.outputs.configured == 'true'
        run: |
          for url in "${APW_LIVE_BASE_URL}" "${APW_LIVE_BASE_URL}/"; do
            curl -fsSL "$url" | grep -F "<title>AI Provider Watch Live Feed</title>"
          done
      - name: Smoke public live root aliases
        if: steps.r2_config.outputs.configured == 'true'
        run: |
          root_url="${APW_LIVE_BASE_URL%/v1}"
          for url in "$root_url" "$root_url/"; do
            curl -fsSL "$url" | grep -F "<title>AI Provider Watch Live Feed</title>"
          done
          curl -fsSL "$root_url/index.html" | grep -F "<title>AI Provider Watch Live Feed</title>"
          uv run apw live health --url "$root_url/health.json" --summary
          uv run apw live latest --url "$root_url/latest.json" --limit 1 >/tmp/apw-root-latest.json
      - name: Upload live dry-run artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: apw-live-dry-run
          retention-days: 2
          path: |
            .apw/live/
            .apw/live-candidates/
            .apw/live-source-observations.json
            .apw/live-candidate-generation.json
          if-no-files-found: error

name: CodeQL

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "27 4 * * 2"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: python
      - uses: github/codeql-action/analyze@v4

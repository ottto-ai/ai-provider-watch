name: Bug
description: Report a CLI, schema, validation, feed, or docs bug.
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
